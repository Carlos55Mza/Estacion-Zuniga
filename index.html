<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estación Zúñiga Pro ⚡</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        body {
            font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0;
            min-height: 100vh; display: flex; flex-direction: column; align-items: center;
            background: #222 url('https://images.unsplash.com/photo-1542601906990-b4d3fb778b09?auto=format&fit=crop&q=80&w=1600') no-repeat center center fixed;
            background-size: cover; transition: background 1.5s ease-in-out; color: white;
            position: relative; overflow-x: hidden;
        }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); z-index: 1; }

        .content-wrapper { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; width: 100%; }

        /* ALERTAS */
        #sismo-banner {
            display: none; background: #ee675c; color: white; width: 100%; text-align: center;
            padding: 15px; font-weight: bold; position: fixed; top: 0; z-index: 2000;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5); animation: slideDown 0.5s ease;
        }
        @keyframes slideDown { from {top: -50px;} to {top: 0;} }

        /* VIBRACIÓN */
        .vibrar { animation: shake 0.2s infinite; }
        @keyframes shake { 0% {transform: translate(2px, 2px)} 50% {transform: translate(-3px, -2px)} 100% {transform: translate(2px, 2px)} }

        .datetime-container { margin-top: 4vh; text-align: center; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        #live-clock { font-size: 2.8rem; font-weight: 700; margin: 0; }
        #live-date { font-size: 1rem; text-transform: uppercase; opacity: 0.9; letter-spacing: 3px; }

        .main-card {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(25px);
            border: 1px solid rgba(255,255,255,0.2); border-radius: 40px;
            padding: 30px; width: 85%; max-width: 400px; text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5); margin-top: 3vh;
        }

        .temp { font-size: 7rem; font-weight: 900; margin: 0; }
        .icon-main { font-size: 90px !important; color: #FFD700; }

        /* ADMIN */
        #admin-panel { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; color: #333; padding: 30px; border-radius: 25px; 
            width: 320px; z-index: 3000; box-shadow: 0 0 100px rgba(0,0,0,0.8);
        }
        select, input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }

        .btn-danger { background: #d93025; color: white; border: none; padding: 12px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }

        .dock {
            display: flex; gap: 20px; background: rgba(0,0,0,0.7); padding: 15px 30px;
            border-radius: 40px; position: fixed; bottom: 30px; z-index: 50;
        }
        .dock-item { text-decoration: none; color: white; text-align: center; font-size: 11px; }
    </style>
</head>
<body id="bg">
    <div class="overlay" id="main-overlay"></div>
    <div id="sismo-banner">🚨 ALERTA DE SISMO DETECTADA - BUSQUE REFUGIO 🚨</div>

    <div class="content-wrapper" id="shake-target">
        <div class="datetime-container">
            <h2 id="live-clock">00:00:00</h2>
            <div id="live-date">...</div>
        </div>

        <div class="main-card">
            <div style="letter-spacing: 5px; font-size: 10px; opacity: 0.7; margin-bottom: 10px;">SAN MARTÍN, MENDOZA</div>
            <span class="material-symbols-outlined icon-main" id="out-icon">wb_sunny</span>
            <h1 class="temp"><span id="out-temp">24</span>°</h1>
            <h2 id="out-desc">Soleado</h2>
            <div id="out-plan" style="background:rgba(0,0,0,0.3); padding:15px; border-radius:20px; margin-top:20px;">¡Sale asadito! 🥩</div>
        </div>

        <button onclick="abrirAdmin()" style="background:rgba(255,255,255,0.2); color:white; border:none; padding:10px 20px; border-radius:50px; margin-top:20px; cursor:pointer;">⚙️ CONFIGURAR</button>
    </div>

    <!-- PANEL ADMIN -->
    <div id="admin-panel">
        <h3>🎙️ Control de Estación</h3>
        <input type="number" id="in-temp" placeholder="Temp °C" value="24">
        <select id="in-clima">
            <option value="soleado">☀️ Soleado</option>
            <option value="nublado">☁️ Nublado</option>
            <option value="lluvia">🌧️ Tormenta</option>
            <option value="zonda">🔥 Zonda</option>
            <option value="noche">🌙 Noche</option>
        </select>
        <button onclick="actualizarTodo()" style="width:100%; padding:12px; background:#1e3c72; color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">ACTUALIZAR WEB</button>
        <button class="btn-danger" onclick="toggleSismo()">⚠️ ACTIVAR SISMO</button>
        <center><p onclick="cerrarAdmin()" style="cursor:pointer; margin-top:15px; color:gray;">Cerrar</p></center>
    </div>

    <div class="dock">
        <a href="https://wa.me/" class="dock-item"><span class="material-symbols-outlined">chat</span><br>WA</a>
        <a href="https://www.google.com/maps" class="dock-item"><span class="material-symbols-outlined">map</span><br>Mapa</a>
        <a href="tel:911" class="dock-item" style="color:#ff4b2b"><span class="material-symbols-outlined">emergency</span><br>911</a>
    </div>

    <script>
        function updateTime() {
            const now = new Date();
            document.getElementById('live-clock').innerText = now.toLocaleTimeString('es-AR', { hour12: false });
            document.getElementById('live-date').innerText = now.toLocaleDateString('es-AR', { weekday: 'long', day: 'numeric', month: 'long' });
        }
        setInterval(updateTime, 1000); updateTime();

        const fondos = {
            soleado: "https://images.unsplash.com/photo-1542601906990-b4d3fb778b09?auto=format&fit=crop&q=80&w=1600",
            nublado: "https://images.unsplash.com/photo-1534088568595-a066f410bcda?auto=format&fit=crop&q=80&w=1600",
            lluvia: "https://images.unsplash.com/photo-1433838552652-f9a46b332c40?auto=format&fit=crop&q=80&w=1600",
            zonda: "https://images.unsplash.com/photo-1508674861872-a51e06c50c9b?auto=format&fit=crop&q=80&w=1600",
            noche: "https://images.unsplash.com/photo-1502134249126-9f3755a50d78?auto=format&fit=crop&q=80&w=1600"
        };
        const iconos = { soleado: "wb_sunny", nublado: "cloud", lluvia: "thunderstorm", zonda: "air", noche: "dark_mode" };

        function abrirAdmin() { document.getElementById('admin-panel').style.display = 'block'; }
        function cerrarAdmin() { document.getElementById('admin-panel').style.display = 'none'; }

        function actualizarTodo() {
            const clima = document.getElementById('in-clima').value;
            const temp = document.getElementById('in-temp').value;
            document.body.style.backgroundImage = `url('${fondos[clima]}')`;
            document.getElementById('out-temp').innerText = temp;
            document.getElementById('out-icon').innerText = iconos[clima];
            document.getElementById('out-desc').innerText = clima.toUpperCase();
            cerrarAdmin();
        }

        let sismoOn = false;
        function toggleSismo() {
            sismoOn = !sismoOn;
            const banner = document.getElementById('sismo-banner');
            const target = document.getElementById('shake-target');
            if(sismoOn) {
                banner.style.display = 'block';
                target.classList.add('vibrar');
                document.getElementById('main-overlay').style.background = 'rgba(255,0,0,0.4)';
            } else {
                banner.style.display = 'none';
                target.classList.remove('vibrar');
                document.getElementById('main-overlay').style.background = 'rgba(0,0,0,0.4)';
            }
            cerrarAdmin();
        }
    </script>
</body>
</html>
