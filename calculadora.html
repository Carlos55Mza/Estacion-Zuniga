<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora - Estación Zúñiga</title>
    <style>
        :root {
            --fondo: #2c3e50;
            --pantalla: #ecf0f1;
            --boton-num: #34495e;
            --boton-op: #e67e22;
            --boton-igual: #27ae60;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .btn-volver {
            text-decoration: none;
            color: white;
            background: #007bff;
            padding: 10px 20px;
            border-radius: 25px;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .calculadora {
            background-color: var(--fondo);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 320px;
        }
        #pantalla {
            width: 100%;
            height: 60px;
            background-color: var(--pantalla);
            border: none;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: right;
            padding: 10px;
            font-size: 24px;
            box-sizing: border-box;
            color: #333;
        }
        .teclado {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        button {
            height: 60px;
            border: none;
            border-radius: 10px;
            font-size: 20px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            background-color: var(--boton-num);
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.95); }
        .operador { background-color: var(--boton-op); }
        .igual { background-color: var(--boton-igual); grid-column: span 2; }
        .borrar { background-color: #c0392b; grid-column: span 2; }
    </style>
</head>
<body>

    <a href="index.html" class="btn-volver">← Volver a la Estación</a>

    <div class="calculadora">
        <input type="text" id="pantalla" readonly value="0">
        <div class="teclado">
            <button class="borrar" onclick="limpiar()">C</button>
            <button class="operador" onclick="agregar('/')">÷</button>
            <button class="operador" onclick="agregar('*')">×</button>
            
            <button onclick="agregar('7')">7</button>
            <button onclick="agregar('8')">8</button>
            <button onclick="agregar('9')">9</button>
            <button class="operador" onclick="agregar('-')">-</button>
            
            <button onclick="agregar('4')">4</button>
            <button onclick="agregar('5')">5</button>
            <button onclick="agregar('6')">6</button>
            <button class="operador" onclick="agregar('+')">+</button>
            
            <button onclick="agregar('1')">1</button>
            <button onclick="agregar('2')">2</button>
            <button onclick="agregar('3')">3</button>
            <button onclick="agregar('.')">.</button>
            
            <button onclick="agregar('0')">0</button>
            <button class="igual" onclick="calcular()">=</button>
        </div>
    </div>

    <script>
        let pantalla = document.getElementById('pantalla');

        function agregar(valor) {
            if (pantalla.value === '0') {
                pantalla.value = valor;
            } else {
                pantalla.value += valor;
            }
        }

        function limpiar() {
            pantalla.value = '0';
        }

        function calcular() {
            try {
                // eval realiza la cuenta matemática automáticamente
                pantalla.value = eval(pantalla.value);
            } catch (error) {
                pantalla.value = 'Error';
                setTimeout(limpiar, 1500);
            }
        }
    </script>
</body>
</html>
